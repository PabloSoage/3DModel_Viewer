{% extends "base.html" %}

{% block title %}Admin: Settings - 3D Model Viewer{% endblock %}

{% block content %}
<div class="row mb-4">
  <div class="col-md-8">
    <h1 class="mb-0">Application Settings</h1>
    <p class="text-muted">Manage dynamic configuration values</p>
  </div>
  <div class="col-md-4 text-end">
    <button class="btn btn-outline-primary" id="refresh-settings"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
  </div>
</div>

<table class="table table-striped" id="settings-table">
  <thead>
    <tr>
      <th>Key</th>
      <th>Value</th>
      <th class="text-end">Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- File Browser Modal -->
<div class="modal fade" id="fileBrowserModal" tabindex="-1" aria-labelledby="fileBrowserLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="fileBrowserLabel">Select Directory</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <ul class="list-group" id="file-list"></ul>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('token');
  const tableBody = document.querySelector('#settings-table tbody');
  const refreshBtn = document.getElementById('refresh-settings');
  let currentDirKey = null;

  async function loadSettings() {
    try {
      const res = await fetch('/api/v1/settings', { headers: { 'Authorization': `Bearer ${token}` } });
      const settings = await res.json();
      tableBody.innerHTML = '';
      settings.forEach(s => {
        const tr = document.createElement('tr');
        // Show browse only for directory settings
        const canBrowse = ['MODELS_BASE_DIR', 'STL_PREVIEW_DIR'].includes(s.key);
        tr.innerHTML = `
          <td>${s.key}</td>
          <td><input type="text" class="form-control" value="${s.value}" data-key="${s.key}"></td>
          <td class="text-end">
            ${canBrowse ? `<button class="btn btn-sm btn-secondary browse-btn" data-key="${s.key}"><i class="bi bi-folder"></i></button>` : ''}
            <button class="btn btn-sm btn-primary save-btn" data-key="${s.key}"><i class="bi bi-save"></i> Save</button>
          </td>`;
        tableBody.appendChild(tr);
      });
      attachActions();
      // Disable save buttons until a change is made
      document.querySelectorAll('input[data-key]').forEach(input => {
        const key = input.dataset.key;
        input.dataset.original = input.value;
        const btn = document.querySelector(`button.save-btn[data-key="${key}"]`);
        if (btn) btn.disabled = true;
        input.addEventListener('input', () => {
          if (btn) btn.disabled = (input.value === input.dataset.original);
        });
      });
    } catch (e) { console.error(e); }
  }

  function attachActions() {
    document.querySelectorAll('.save-btn').forEach(btn => {
      btn.onclick = async () => {
        const key = btn.dataset.key;
        const input = document.querySelector(`input[data-key="${key}"]`);
        const value = input.value;
        await fetch(`/api/v1/settings/${key}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ key, value })
        });
        showToast(`Setting ${key} updated`, 'success');
        // Update original value after save
        input.dataset.original = value;
        btn.disabled = true;
      };
    });
    document.querySelectorAll('.browse-btn').forEach(btn => {
      btn.onclick = () => {
        currentDirKey = btn.dataset.key;
        openBrowserDialog();
      };
    });
  }

  // Helper function to update input value and enable save button
  function updateInputValue(key, value) {
    const input = document.querySelector(`input[data-key="${key}"]`);
    if (input) {
      input.value = value;
      // Enable save button if value changed
      const saveBtn = document.querySelector(`button.save-btn[data-key="${key}"]`);
      if (saveBtn) {
        saveBtn.disabled = (value === input.dataset.original);
      }
    }
  }

  async function openBrowserDialog(overridePath) {
    const input = document.querySelector(`input[data-key="${currentDirKey}"]`);
    // Determine directory to browse: either override or current input
    let base = overridePath !== undefined ? overridePath.replace(/\\/g, '/') : input.value.replace(/\\/g, '/');
    console.log('Opening directory browser for:', base);
    // Fetch directory listing; encode path properly
    const res = await fetch(`/api/v1/settings/files?path=${encodeURIComponent(base)}`, { headers: { 'Authorization': `Bearer ${token}` } });
    // Handle non-OK responses (e.g., path not found)
    if (!res.ok) {
      let err = 'Unknown error';
      try {
        const json = await res.json(); err = json.detail || JSON.stringify(json);
      } catch {}
      showToast(`Error: ${err}`, 'danger');
      return;
    }
    const items = await res.json();
    if (!Array.isArray(items)) {
      showToast('Invalid directory listing', 'danger');
      return;
    }
    
    // Clear and rebuild file list
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    // Show modal first to avoid UI glitches
    const modalElement = document.getElementById('fileBrowserModal');
    if (!bootstrap.Modal.getInstance(modalElement)) {
      const modal = new bootstrap.Modal(modalElement);
      modal.show();
    }
    
    if (!items || items.length === 0) {
      const li = document.createElement('li');
      li.className = 'list-group-item';
      li.textContent = 'No items found';
      list.appendChild(li);
    }
    
    items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'list-group-item list-group-item-action';
      li.textContent = item.name === '..' ? '..' : item.name;
      li.onclick = () => {
        if (item.name === '..') {
          // navigate up without closing modal
          openBrowserDialog(item.path);
        } else {
          // select this directory or file
          updateInputValue(currentDirKey, item.path);
          showToast(`Selected ${item.path}`, 'info');
          const modal = bootstrap.Modal.getInstance(modalElement);
          if (modal) modal.hide();
        }
      };
      list.appendChild(li);
    });
  }

  refreshBtn.addEventListener('click', loadSettings);
  loadSettings();
});
</script>
{% endblock %}
