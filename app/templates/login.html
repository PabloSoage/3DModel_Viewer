{% extends "base.html" %}

{% block title %}Login - 3D Model Viewer{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="my-0">Login</h4>
            </div>
            <div class="card-body">
                <form id="login-form">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" id="login-button">
                            <span class="spinner-border spinner-border-sm d-none" id="login-spinner" role="status" aria-hidden="true"></span>
                            Login
                        </button>
                    </div>
                </form>
                <div class="alert alert-danger mt-3 d-none" id="login-error"></div>
                <div class="alert alert-info mt-3" role="alert">
                    <small>Default admin credentials: username: <strong>admin</strong>, password: <strong>admin</strong></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', async function() {
        const loginForm = document.getElementById('login-form');
        const loginButton = document.getElementById('login-button');
        const loginSpinner = document.getElementById('login-spinner');
        const loginError = document.getElementById('login-error');
        
        console.log("Login page loaded");
        
        // Limpiar cualquier mensaje de error anterior
        loginError.classList.add('d-none');
        
        // Eliminar cualquier token inválido que pudiera existir
        localStorage.removeItem('token');
        console.log("Removed any existing token on login page load");
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log("Login form submitted");
            
            // Mostrar spinner y deshabilitar botón
            loginButton.disabled = true;
            loginSpinner.classList.remove('d-none');
            loginError.classList.add('d-none');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            console.log(`Attempting to login with username: ${username}`);
            
            try {
                // Usar el método login de Auth
                await Auth.login(username, password);
                console.log("Login successful, redirecting to models page");
                
                // Redirigir a la página de modelos
                window.location.href = '/models';
            } catch (error) {
                console.error("Login failed:", error.message);
                loginError.textContent = error.message;
                loginError.classList.remove('d-none');
            } finally {
                // Ocultar spinner y habilitar botón
                loginButton.disabled = false;
                loginSpinner.classList.add('d-none');
            }
        });
    });
</script>
{% endblock %}
