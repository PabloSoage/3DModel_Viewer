<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}3D Model Viewer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/models">3D Model Viewer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="main-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/models"><i class="bi bi-collection"></i> Models</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle"></i> 
                            <span id="username-display">Account</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#" id="logout-button"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1100"></div>
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Incluir nuestro archivo de autenticación compartido -->
    <script src="{{ url_for('static', path='/js/auth.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const logoutButton = document.getElementById('logout-button');
            const usernameDisplay = document.getElementById('username-display');
            const mainNav = document.getElementById('main-nav');
            
            // Si estamos en la página de login, no intentar proteger la ruta
            // Esto es para evitar ciclos de redirección
            if (window.location.pathname === '/login') {
                console.log("En página de login - no se verifica autenticación");
                return;
            }
            
            // Para otras páginas, verificar autenticación
            console.log("Verificando autenticación para: " + window.location.pathname);
            const authenticated = await Auth.protectRoute();
            if (!authenticated) {
                console.log("No autenticado - redirigiendo a login");
                return;
            }
            
            console.log("Usuario autenticado, cargando datos de usuario");
            
            // Si estamos autenticados, cargar la información del usuario
            const userData = await Auth.getCurrentUser();
            
            if (userData) {
                // Actualizar nombre de usuario en el menú
                usernameDisplay.textContent = userData.username;
                
                // Agregar enlaces de administrador si el usuario es admin
                if (userData.is_admin) {
                    // Agregar enlace a Usuarios para admins
                    const usersLink = document.createElement('li');
                    usersLink.className = 'nav-item';
                    usersLink.innerHTML = '<a class="nav-link" href="/admin/users"><i class="bi bi-people"></i> Users</a>';
                    mainNav.appendChild(usersLink);
                    
                    // Agregar enlace a Admin Models si no estamos ya en esa página
                    if (!window.location.pathname.includes('/admin/models')) {
                        const adminModelsLink = document.createElement('li');
                        adminModelsLink.className = 'nav-item';
                        adminModelsLink.innerHTML = '<a class="nav-link" href="/admin/models"><i class="bi bi-gear"></i> Admin Models</a>';
                        mainNav.appendChild(adminModelsLink);
                    }

                    // Agregar enlace a Settings si no estamos ya en esa página
                    if (!window.location.pathname.includes('/admin/settings')) {
                        const settingsLink = document.createElement('li');
                        settingsLink.className = 'nav-item';
                        settingsLink.innerHTML = '<a class="nav-link" href="/admin/settings"><i class="bi bi-sliders"></i> Settings</a>';
                        mainNav.appendChild(settingsLink);
                    }
                }
            }
            
            // Configurar botón de logout
            if (logoutButton) {
                logoutButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    Auth.logout();
                });
            }
        });

        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type} border-0`;
            toast.setAttribute('role', 'alert');
            toast.setAttribute('aria-live', 'assertive');
            toast.setAttribute('aria-atomic', 'true');
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">
                        ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            `;
            toastContainer.appendChild(toast);
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
            toast.addEventListener('hidden.bs.toast', function() {
                toast.remove();
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
